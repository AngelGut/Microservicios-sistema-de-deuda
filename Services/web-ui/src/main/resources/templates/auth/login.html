<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exterminadora Tejada – Iniciar Sesión</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/login.css}" />
  </head>
  <body>
    <div class="bg-grid"></div>

    <div class="wrapper">
      <!-- LEFT PANEL — logo se funde con el fondo #172238 -->
      <div class="panel-left">
        <div class="logo-area">
          <img th:src="@{/images/logo.png}" alt="Exterminadora Tejada" />
        </div>
        <div class="divider"></div>
        <p class="panel-desc">
          Sistema de gestión integral de<br />deudores y pagos para tu empresa.
        </p>
      </div>

      <!-- RIGHT PANEL -->
      <div class="panel-right">
        <div class="form-title">Iniciar Sesión</div>
        <div class="form-subtitle">Sistema de Gestión de Deudores</div>

        <div th:if="${error}" class="alert-error">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          <span th:text="${error}"></span>
        </div>

        <form method="post" th:action="@{/auth/login}">
          <div class="field">
            <label>Correo Electrónico</label>
            <div class="field-wrap">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                />
                <polyline points="22,6 12,13 2,6" />
              </svg>
              <input
                type="email"
                name="email"
                placeholder="usuario@tejada.com"
                required
                autocomplete="email"
              />
            </div>
          </div>

          <div class="field">
            <label>Contraseña</label>
            <div class="field-wrap">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect x="3" y="11" width="18" height="11" rx="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
              <input
                type="password"
                name="password"
                placeholder="••••••••"
                required
                autocomplete="current-password"
              />
            </div>
          </div>

          <button type="submit" class="btn-submit">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
              <polyline points="10 17 15 12 10 7" />
              <line x1="15" y1="12" x2="3" y2="12" />
            </svg>
            Ingresar al Sistema
          </button>
        </form>

        <div class="footer-note">
          © 2026 Exterminadora Tejada · Todos los derechos reservados
        </div>
      </div>
    </div>

    <script th:src="@{/js/login.js}"></script>
  </body>
</html>
