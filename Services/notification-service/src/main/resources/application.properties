# ============================================================
#  notification-service – application.properties
# ============================================================

server.port=${PORT:8085}
spring.application.name=notification-service

sendgrid.api-key=${SENDGRID_API_KEY:}

# ── Base de Datos (SQLite – historial de notificaciones) ────
spring.datasource.url=jdbc:sqlite:./data/notification.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# ── Flyway ──────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── JWT ─────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}

# ── URLs de microservicios externos ─────────────────────────
app.debt-service.base-url=${DEBT_SERVICE_URL:http://debt-service.railway.internal:8080}
app.debtor-service.base-url=${DEBTOR_SERVICE_URL:http://sincere-reverence.railway.internal:8080}

# ── Días de anticipación para recordatorio de vencimiento ───
app.notification.reminder-days-before=3

# ── SMTP (JavaMailSender) ────────────────────────────────────
# Para producción: exportar estas variables como env vars
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:noreply@tusistema.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Remitente visible al destinatario
app.mail.from=${MAIL_FROM:Sistema de Deudas <noreply@tusistema.com>}

# ── Scheduler ────────────────────────────────────────────────
# Activar tareas programadas (puede desactivarse en tests)
spring.task.scheduling.pool.size=2

# ── Resilience4j – Circuit Breakers para clientes HTTP ──────
resilience4j.circuitbreaker.instances.debtClient.slidingWindowSize=5
resilience4j.circuitbreaker.instances.debtClient.failureRateThreshold=50
resilience4j.circuitbreaker.instances.debtClient.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.debtClient.permittedNumberOfCallsInHalfOpenState=2
resilience4j.circuitbreaker.instances.debtClient.registerHealthIndicator=true

resilience4j.retry.instances.debtClient.maxAttempts=3
resilience4j.retry.instances.debtClient.waitDuration=500ms

resilience4j.circuitbreaker.instances.debtorClient.slidingWindowSize=5
resilience4j.circuitbreaker.instances.debtorClient.failureRateThreshold=50
resilience4j.circuitbreaker.instances.debtorClient.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.debtorClient.registerHealthIndicator=true

resilience4j.retry.instances.debtorClient.maxAttempts=3
resilience4j.retry.instances.debtorClient.waitDuration=500ms

# ── Actuator ─────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers
management.endpoint.health.show-details=always

# ── Swagger / OpenAPI ─────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ── Jackson ───────────────────────────────────────────────────
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ── Logging ───────────────────────────────────────────────────
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level [traceId=%X{traceId}] %logger{36} - %msg%n
