# =============================================================
# API GATEWAY — application.properties
# Mismo formato que auth-service y debt-service del equipo
# =============================================================

spring.application.name=api-gateway

# =============================================================
# SERVER
# =============================================================
server.port=8080

# =============================================================
# RUTAS — perfil local (localhost)
# Para Railway cambiar a los nombres de host de cada servicio
# =============================================================

# auth-service — /api/v1/auth/**
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**

# debtor-service — /api/v1/debtors/**
spring.cloud.gateway.routes[1].id=debtor-service
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/debtors/**

# debt-service — /api/v1/debts/**
spring.cloud.gateway.routes[2].id=debt-service
spring.cloud.gateway.routes[2].uri=http://localhost:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/debts/**

# payment-service — /api/v1/payments/**
spring.cloud.gateway.routes[3].id=payment-service
spring.cloud.gateway.routes[3].uri=http://localhost:8084
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/payments/**

# fx-service — /api/v1/fx/**
spring.cloud.gateway.routes[4].id=fx-service
spring.cloud.gateway.routes[4].uri=http://localhost:8085
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/fx/**

# notification-service — /api/v1/notifications/**
spring.cloud.gateway.routes[5].id=notification-service
spring.cloud.gateway.routes[5].uri=http://localhost:8086
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/notifications/**

# ai-risk-service — /api/v1/risk/**
spring.cloud.gateway.routes[6].id=ai-risk-service
spring.cloud.gateway.routes[6].uri=http://localhost:8087
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/v1/risk/**

# web-ui — /api/v1/web/** (opcional, si se necesita enrutar algo del UI)
spring.cloud.gateway.routes[7].id=web-ui
spring.cloud.gateway.routes[7].uri=http://localhost:8090
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/v1/web/**

# =============================================================
# ACTUATOR — igual que auth-service y debt-service
# =============================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# =============================================================
# SWAGGER / OPENAPI — para WebFlux
# =============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# =============================================================
# LOGGING
# =============================================================
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.com.example.gateway=DEBUG
