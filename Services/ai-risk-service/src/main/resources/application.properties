server.port=8086
spring.application.name=ai-risk-service

spring.datasource.url=jdbc:sqlite:./data/ai-risk.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

app.jwt.secret=${JWT_SECRET:mySuperSecretKeyForJWTSigningThatMustBeAtLeast256BitsLong!!}
app.payment-service.base-url=${PAYMENT_SERVICE_URL:http://localhost:8084}

spring.cloud.openfeign.circuitbreaker.enabled=true

resilience4j.circuitbreaker.instances.paymentClient.slidingWindowSize=5
resilience4j.circuitbreaker.instances.paymentClient.failureRateThreshold=50
resilience4j.circuitbreaker.instances.paymentClient.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.paymentClient.permittedNumberOfCallsInHalfOpenState=2
resilience4j.circuitbreaker.instances.paymentClient.registerHealthIndicator=true
resilience4j.retry.instances.paymentClient.maxAttempts=3
resilience4j.retry.instances.paymentClient.waitDuration=500ms

spring.cache.type=simple
spring.task.scheduling.pool.size=2

management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers,caches
management.endpoint.health.show-details=always

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level [traceId=%X{traceId}] %logger{36} - %msg%n
